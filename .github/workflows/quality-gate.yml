name: Quality Gate

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Type check
        run: npm run typecheck --if-present

  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30
      - name: Comment PR with test results
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let summary = 'Playwright: todos os testes passaram.';
            try {
              const results = JSON.parse(fs.readFileSync('test-results/.last-run.json', 'utf8'));
              const { passed, failed, skipped } = results;
              if (failed > 0) {
                summary = 'Playwright: ' + failed + ' falha(s) - ' + passed + ' passou';
              } else {
                summary = 'Playwright: ' + passed + ' testes passando';
              }
            } catch {}
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Quality Gate\n\n' + summary
            });

  badge:
    name: Update Coverage Badge
    runs-on: ubuntu-latest
    needs: playwright
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - name: Update README badge
        run: echo "Quality Gate passed"
